<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Darkfall Players • Settings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    
    .player-card {
      transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    
    .player-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 30px 40px -15px rgb(0 0 0 / 0.15);
    }
    
    .portrait-container { transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .player-card:hover .portrait-container { transform: scale(1.06); }
    
    .portrait {
      transition: all 0.3s ease;
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
    }
    
    .player-card:hover .portrait {
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.2),
                  0 0 0 8px rgb(16 185 129 / 0.25);
    }
    .dark .player-card:hover .portrait {
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.2),
                  0 0 0 8px rgb(59 130 246 / 0.25);
    }
    
    .name {
      transition: color 0.25s ease;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .player-card:hover .name {
      color: rgb(16 185 129);
    }
    .dark .player-card:hover .name {
      color: rgb(59 130 246);
    }
  </style>
</head>
<body class="bg-white dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-screen">

  <div class="max-w-6xl mx-auto px-6 py-10">
    <div class="flex justify-between items-center mb-10">
      <div>
        <h1 class="text-4xl font-bold tracking-tight">dfsettings</h1>
        <p class="text-zinc-500 dark:text-zinc-400 mt-1">player settings for darkfall rise of agon</p>
      </div>
      
      <div class="flex items-center gap-3">
        <button onclick="startDiscordLogin()" 
                class="flex items-center gap-2 bg-[#5865F2] hover:bg-[#4752C4] text-white px-6 py-3 rounded-2xl transition-all font-medium">
          <i class="fa-brands fa-discord"></i>
          <span>Login with Discord</span>
        </button>

        <button id="themeToggle" 
                class="flex items-center gap-2 bg-zinc-100 dark:bg-zinc-900 hover:bg-zinc-200 dark:hover:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 px-5 py-3 rounded-2xl transition-all">
          <i id="themeIcon" class="fa-solid fa-sun text-xl"></i>
          <span id="themeText" class="font-medium">Light Mode</span>
        </button>
      </div>
    </div>

    <div class="flex flex-col sm:flex-row gap-4 mb-8">
      <div class="relative flex-1 max-w-md">
        <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-zinc-400"></i>
        <input id="searchInput" type="text" placeholder="Search player name or clan..." 
               class="w-full bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 focus:border-blue-600 dark:focus:border-emerald-500 rounded-2xl pl-11 py-3.5 outline-none transition-colors">
      </div>
      <select id="sortSelect" 
              class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 rounded-2xl px-5 py-3.5 outline-none focus:border-blue-600 dark:focus:border-emerald-500 transition-colors">
        <option value="name">Sort by Name (A-Z)</option>
        <option value="dpi">Sort by DPI (low → high)</option>
        <option value="edpi">Sort by eDPI (low → high)</option>
      </select>
    </div>

    <div id="playersGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
  </div>

  <!-- Detail Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
    <div class="bg-white dark:bg-zinc-900 rounded-3xl max-w-md w-full overflow-hidden shadow-2xl">
      <div class="p-6 border-b border-zinc-200 dark:border-zinc-700 flex items-center justify-between">
        <div id="modalHeader" class="flex items-center gap-4"></div>
        <button onclick="closeModal()" class="text-3xl leading-none text-zinc-400 hover:text-zinc-600 dark:hover:text-white">×</button>
      </div>
      <div class="p-8 space-y-8" id="modalContent"></div>
    </div>
  </div>

  <script>
    const WORKER_URL = "https://rapid-cell-f430.malmrosc.workers.dev";

    const players = [
      { name: "Grimtide Darkfell", clan: "Rangers", flag: "us", avatar: "images/grimtide.png", mouse: "...", mousepad: "...", dpi: 800, sensitivity: 1.35, resolution: "1920x1080", fov: 90, notes: "" },
      { name: "Inositol Rex", clan: "Blackwater", flag: "us", avatar: "images/rex.jpg", mouse: "...", mousepad: "...", dpi: 800, sensitivity: 1.35, resolution: "1920x1080", fov: 90, notes: "" },
      { name: "Minotaur King", clan: "Blackwater", flag: "se", avatar: "images/mino.png", mouse: "...", mousepad: "...", dpi: 800, sensitivity: 1.35, resolution: "1920x1080", fov: 90, notes: "" },
      { name: "Ninogan Swiftstep", clan: "GET GOOD", flag: "se", avatar: "images/ninogan.png", mouse: "wlmouse Beast X Pro", mousepad: "Artisan FX Zero Soft XL", dpi: 400, sensitivity: 1.30, resolution: "2560x1440", fov: 120, notes: "" }
    ];

    let currentTheme = 'light';

    function calculateEDPI(dpi, sens) {
      return Math.round(dpi * sens * 100) / 100;
    }

    function getInitials(name) {
      const parts = name.trim().split(/\s+/);
      if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
      return name.substring(0, 2).toUpperCase();
    }

    function getAccentColor() {
      return currentTheme === 'dark' ? 'emerald' : 'blue';
    }

    function startDiscordLogin() {
      window.location.href = `${WORKER_URL}/login`;
    }

    function renderPlayers(filteredPlayers) {
      const grid = document.getElementById('playersGrid');
      grid.innerHTML = '';

      const accent = getAccentColor();

      filteredPlayers.forEach(player => {
        const edpi = calculateEDPI(player.dpi, player.sensitivity);
        const initials = getInitials(player.name);
        const flagUrl = player.flag ? `https://flagcdn.com/w40/${player.flag}.png` : '';

        const cardHTML = `
          <div class="player-card bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-3xl overflow-hidden cursor-pointer">
            <div class="pt-8 pb-4 flex justify-center portrait-container">
              <div class="portrait w-40 h-40 rounded-full overflow-hidden border-4 border-white dark:border-zinc-900 bg-zinc-100 dark:bg-zinc-800 flex items-center justify-center">
                ${player.avatar 
                  ? `<img src="${player.avatar}" alt="${player.name}" class="w-full h-full object-cover">` 
                  : `<div class="text-6xl font-bold text-zinc-400 dark:text-zinc-500">${initials}</div>`}
              </div>
            </div>
            <div class="px-6 text-center flex-1 flex flex-col">
              <div class="flex items-center justify-center gap-3 mt-auto">
                <div class="name text-[20px] font-bold tracking-tight text-${accent}-600 dark:text-${accent}-400">${player.name}</div>
                ${flagUrl ? `<img src="${flagUrl}" alt="${player.flag}" class="w-6 h-4 rounded shadow-sm">` : ''}
              </div>
              <div class="mt-2 text-lg text-zinc-500 dark:text-zinc-400">${player.clan}</div>
            </div>
            <div class="mt-auto bg-zinc-100 dark:bg-zinc-950 px-6 py-5 text-center text-xs font-medium text-zinc-400 dark:text-zinc-500 border-t border-zinc-200 dark:border-zinc-700">
              Click for full settings →
            </div>
          </div>
        `;

        const card = document.createElement('div');
        card.innerHTML = cardHTML;
        card.onclick = () => showDetails(player.name);
        grid.appendChild(card);
      });
    }

    function showDetails(name) {
      const player = players.find(p => p.name === name);
      if (!player) return;

      const edpi = calculateEDPI(player.dpi, player.sensitivity);
      const accent = getAccentColor();
      const initials = getInitials(player.name);
      const flagUrl = player.flag ? `https://flagcdn.com/w40/${player.flag}.png` : '';

      const headerHTML = `
        <div class="flex items-center gap-4">
          <div class="w-16 h-16 rounded-2xl overflow-hidden border border-zinc-200 dark:border-zinc-700 flex-shrink-0 flex items-center justify-center text-5xl bg-zinc-100 dark:bg-zinc-800">
            ${player.avatar ? `<img src="${player.avatar}" alt="${player.name}" class="w-full h-full object-cover">` : `<span>${initials}</span>`}
          </div>
          <div>
            <div class="flex items-center gap-3">
              <div class="text-3xl font-bold">${player.name}</div>
              ${flagUrl ? `<img src="${flagUrl}" alt="${player.flag}" class="w-7 h-5 rounded shadow-sm">` : ''}
            </div>
            <div class="text-${accent}-600 dark:text-${accent}-400">${player.clan}</div>
          </div>
        </div>
      `;
      document.getElementById('modalHeader').innerHTML = headerHTML;

      const contentHTML = `
        <div class="grid grid-cols-2 gap-x-8 gap-y-6 text-sm">
          <div><div class="text-zinc-500 dark:text-zinc-400 text-xs tracking-widest mb-1">MOUSE</div><div class="font-medium">${player.mouse}</div></div>
          <div><div class="text-zinc-500 dark:text-zinc-400 text-xs tracking-widest mb-1">MOUSEPAD</div><div class="font-medium">${player.mousepad}</div></div>
          <div><div class="text-zinc-500 dark:text-zinc-400 text-xs tracking-widest mb-1">RESOLUTION</div><div class="font-medium">${player.resolution}</div></div>
          <div><div class="text-zinc-500 dark:text-zinc-400 text-xs tracking-widest mb-1">FOV</div><div class="font-medium">${player.fov || '—'}</div></div>
        </div>

        <div class="bg-zinc-100 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-700 rounded-2xl p-6">
          <div class="grid grid-cols-3 gap-6 text-center">
            <div><div class="text-zinc-500 dark:text-zinc-400 text-xs mb-1">DPI</div><div class="text-4xl font-bold">${player.dpi}</div></div>
            <div><div class="text-zinc-500 dark:text-zinc-400 text-xs mb-1">SENS</div><div class="text-4xl font-bold">${player.sensitivity}</div></div>
            <div><div class="text-zinc-500 dark:text-zinc-400 text-xs mb-1">eDPI</div><div class="text-4xl font-bold text-${accent}-600 dark:text-${accent}-400">${edpi}</div></div>
          </div>
        </div>

        <div class="bg-zinc-100 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-700 rounded-2xl p-6">
          <div class="text-${accent}-600 dark:text-${accent}-400 text-xs tracking-widest mb-4">QUICK eDPI CONVERTER</div>
          <div class="flex gap-4">
            <div class="flex-1">
              <label class="block text-xs text-zinc-500 dark:text-zinc-400 mb-2">DPI</label>
              <input id="convDpi" type="number" value="${player.dpi}" class="w-full bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-600 rounded-xl px-4 py-3 text-lg focus:border-${accent}-600 outline-none">
            </div>
            <div class="flex-1">
              <label class="block text-xs text-zinc-500 dark:text-zinc-400 mb-2">Sensitivity</label>
              <input id="convSens" type="number" value="${player.sensitivity}" step="0.01" class="w-full bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-600 rounded-xl px-4 py-3 text-lg focus:border-${accent}-600 outline-none">
            </div>
          </div>
          <div class="mt-5 text-center">
            <div class="text-xs text-zinc-500 dark:text-zinc-400">Resulting eDPI</div>
            <div id="convResult" class="text-5xl font-bold text-${accent}-600 dark:text-${accent}-400 mt-1"></div>
          </div>
        </div>

        ${player.notes ? `<div class="pt-4 border-t border-zinc-200 dark:border-zinc-700"><div class="text-xs text-zinc-500 dark:text-zinc-400 tracking-widest mb-2">NOTES</div><div class="text-zinc-700 dark:text-zinc-300">${player.notes}</div></div>` : ''}
      `;

      document.getElementById('modalContent').innerHTML = contentHTML;
      document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    function applyTheme(isDark) {
      currentTheme = isDark ? 'dark' : 'light';
      if (isDark) {
        document.documentElement.classList.add('dark');
        document.getElementById('themeIcon').classList.replace('fa-sun', 'fa-moon');
        document.getElementById('themeText').textContent = 'Dark Mode';
      } else {
        document.documentElement.classList.remove('dark');
        document.getElementById('themeIcon').classList.replace('fa-moon', 'fa-sun');
        document.getElementById('themeText').textContent = 'Light Mode';
      }
      filterAndSort();
    }

    const searchInput = document.getElementById('searchInput');
    const sortSelect = document.getElementById('sortSelect');

    function filterAndSort() {
      const term = searchInput.value.toLowerCase().trim();
      let filtered = players.filter(p => 
        p.name.toLowerCase().includes(term) || 
        (p.clan && p.clan.toLowerCase().includes(term))
      );

      const sortBy = sortSelect.value;
      if (sortBy === 'dpi') filtered.sort((a, b) => a.dpi - b.dpi);
      else if (sortBy === 'edpi') filtered.sort((a, b) => calculateEDPI(a.dpi, a.sensitivity) - calculateEDPI(b.dpi, b.sensitivity));
      else filtered.sort((a, b) => a.name.localeCompare(b.name));

      renderPlayers(filtered);
    }

    searchInput.addEventListener('input', filterAndSort);
    sortSelect.addEventListener('change', filterAndSort);

    document.getElementById('themeToggle').addEventListener('click', () => {
      applyTheme(currentTheme === 'light');
    });

    // Initial render
    window.onload = () => {
      renderPlayers(players);
    };
  </script>
</body>
</html>
